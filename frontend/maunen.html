<body class="bg-surface text-on-surface selection:bg-primary-fixed-dim selection:text-on-primary-fixed">

    </header>
    <main class="pt-20 overflow-hidden">
        <!-- Hero Section -->

            class="relative min-h-[90vh] flex items-center px-margin-mobile md:px-margin-desktop py-12 max-w-container-max mx-auto overflow-hidden">
        </section>
        <!-- Our Philosophy -->

        <!-- Gallery / Collection Bento -->

        <!-- -->

    </main>
    <!-- Footer -->
    <footer class="bg-surface-container-low dark:bg-inverse-surface w-full relative bottom-0"></footer>
    <script>
        // Micro-interaction for smooth scroll and hover reveals
        document.addEventListener('DOMContentLoaded', () => {
            const observerOptions = {
                threshold: 0.1
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('opacity-100', 'translate-y-0');
                        entry.target.classList.remove('opacity-0', 'translate-y-10');
                    }
                });
            }, observerOptions);

            document.querySelectorAll('section > div').forEach(el => {
                el.classList.add('transition-all', 'duration-1000', 'ease-out', 'opacity-0', 'translate-y-10');
                observer.observe(el);
            });
        });
    </script>

</body>
