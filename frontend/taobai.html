<!DOCTYPE html>
<html class="light" lang="vi">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=block"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">try {
            try {
                tailwind.config = {
                    darkMode: "class",
                    theme: {
                        extend: {
                            "colors": {
                                "surface-container-highest": "#e0e3e5",
                                "surface-bright": "#f7f9fb",
                                "on-secondary-fixed": "#341100",
                                "surface-container-low": "#f2f4f6",
                                "on-primary-fixed": "#001453",
                                "on-tertiary-fixed": "#001c39",
                                "surface-container": "#eceef0",
                                "on-background": "#191c1e",
                                "on-tertiary-container": "#8fbeff",
                                "surface-tint": "#1e3a8a",
                                "tertiary-fixed": "#d4e3ff",
                                "tertiary-fixed-dim": "#a4c9ff",
                                "primary-fixed": "#dde1ff",
                                "tertiary-container": "#004c8b",
                                "surface-variant": "#e0e3e5",
                                "on-secondary-fixed-variant": "#783200",
                                "on-primary-container": "#a8b8ff",
                                "on-error": "#ffffff",
                                "inverse-primary": "#b8c4ff",
                                "on-tertiary-fixed-variant": "#004883",
                                "on-surface": "#191c1e",
                                "on-secondary": "#ffffff",
                                "secondary-container": "#1e3a8a",
                                "background": "#f7f9fb",
                                "on-primary": "#ffffff",
                                "on-tertiary": "#ffffff",
                                "outline-variant": "#c4c5d5",
                                "on-error-container": "#93000a",
                                "outline": "#444653",
                                "secondary-fixed": "#ffdbca",
                                "inverse-on-surface": "#eff1f3",
                                "secondary": "#1e3a8a",
                                "error-container": "#ffdad6",
                                "secondary-fixed-dim": "#ffb690",
                                "primary-fixed-dim": "#b8c4ff",
                                "on-surface-variant": "#191c1e",
                                "on-primary-fixed-variant": "#173bab",
                                "inverse-surface": "#2d3133",
                                "error": "#ba1a1a",
                                "surface": "#f7f9fb",
                                "surface-container-lowest": "#ffffff",
                                "primary-container": "#1e3a8a",
                                "on-secondary-container": "#ffffff",
                                "surface-dim": "#d8dadc",
                                "tertiary": "#003564",
                                "surface-container-high": "#e6e8ea",
                                "primary": "#1e3a8a"
                            },
                            "borderRadius": {
                                "DEFAULT": "0.25rem",
                                "lg": "12px",
                                "xl": "16px",
                                "full": "9999px"
                            },
                            "spacing": {
                                "base": "4px",
                                "margin-mobile": "20px",
                                "lg": "24px",
                                "xs": "4px",
                                "xl": "32px",
                                "sm": "8px",
                                "md": "16px",
                                "gutter-mobile": "12px"
                            },
                            "fontFamily": {
                                "display-lg": ["Inter", "sans-serif"],
                                "body-lg": ["Inter", "sans-serif"],
                                "label-md": ["Inter", "sans-serif"],
                                "body-md": ["Inter", "sans-serif"],
                                "headline-md": ["Inter", "sans-serif"],
                                "title-lg": ["Inter", "sans-serif"],
                                "label-sm": ["Inter", "sans-serif"]
                            },
                            "fontSize": {
                                "display-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                                "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                                "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                                "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                                "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                                "title-lg": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                                "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }]
                            }
                        }
                    }
                }
            } catch (_e) { }
        } catch (_e) { }</script>
</head>

<body
    class="min-h-screen font-body-md text-on-surface flex flex-col items-center justify-start py-xl px-margin-mobile relative overflow-x-hidden bg-surface-container-lowest">
    <!-- Refined Background Overlay to reduce glare -->



    <!-- Header Section -->
    <header
        class="w-full max-w-4xl flex flex-col md:flex-row md:items-end justify-between gap-md mb-xl animate-in fade-in duration-700">
        <div class="flex flex-col gap-xs">
            <div class="flex items-center gap-sm text-primary">
                <span class="material-symbols-outlined text-display-lg"
                    style="font-variation-settings: &quot;FILL&quot; 1;"
                    data-original-icon="assignment">assignment</span>
                <h1 class="font-display-lg text-display-lg text-primary tracking-tight font-bold">Tạo Bài Kiểm Tra Lớn
                </h1>
            </div>
            <div class="flex items-center gap-md text-on-surface font-label-md text-label-md font-semibold">
                <span class="flex items-center gap-1">
                    <span class="material-symbols-outlined text-[18px]">group</span> Lớp: HA01
                </span>
                <span class="text-outline-variant">•</span>
                <span class="flex items-center gap-1">
                    <span class="material-symbols-outlined text-[18px]" data-original-icon="menu_book">menu_book</span>
                    Môn: Hoá học nâng cao
                </span>
            </div>
        </div>
        <button
            class="flex items-center gap-sm px-md py-2 rounded-lg border border-outline text-on-surface font-label-md text-label-md hover:bg-surface-container transition-all active:scale-95 font-semibold bg-white/80 shadow-sm">
            <span class="material-symbols-outlined">arrow_back</span>
            Trở Về
        </button>
    </header>

    <!-- Main Form Card -->
    <main
        class="w-full max-w-4xl bg-surface-container-lowest rounded-xl p-xl shadow-xl border flex flex-col gap-lg mb-xl animate-in slide-in-from-bottom-4 duration-1000 border-outline-variant">
        <!-- Field: Title -->
        <div class="flex flex-col gap-sm">
            <label class="font-label-sm text-label-sm uppercase tracking-widest text-on-surface font-bold">Tiêu đề bài
                kiểm tra</label>
            <input
                class="w-full px-md py-3 rounded-lg border border-outline focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all font-body-md text-body-md bg-surface-bright font-semibold placeholder-outline/60"
                placeholder="Ví dụ: Kiểm tra 1 tiết - Chương 1: Hàm số và Đồ thị" type="text">
        </div>

        <!-- Row: Form Details -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
            <div class="flex flex-col gap-sm">
                <label class="font-label-sm text-label-sm uppercase tracking-widest text-on-surface font-bold">Hình thức
                    kiểm tra</label>
                <div class="relative">
                    <select
                        class="w-full px-md py-3 rounded-lg border border-outline focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all font-body-md text-body-md bg-surface-bright appearance-none font-semibold">
                        <option value="" disabled="" selected="">Chọn hình thức kiểm tra</option>
                        <option value="15min">Kiểm tra 15 phút</option>
                        <option value="1period">Kiểm tra 1 tiết</option>
                        <option value="semester">Thi học kỳ</option>
                        <option value="homework">Bài tập về nhà</option>
                    </select>
                </div>
            </div>
            <div class="flex flex-col gap-sm">
                <label class="font-label-sm text-label-sm uppercase tracking-widest text-on-surface font-bold">Thời gian
                    thi / Hạn nộp</label>
                <div class="relative">
                    <input
                        class="w-full px-md py-3 rounded-lg border border-outline focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all font-body-md text-body-md bg-surface-bright font-semibold"
                        type="datetime-local" value="2026-07-14T07:10">
                </div>
            </div>
        </div>

        <!-- Field: Instructions -->
        <div class="flex flex-col gap-sm">
            <label class="font-label-sm text-label-sm uppercase tracking-widest text-on-surface font-bold">Hướng dẫn /
                Ghi chú chung cho bài thi</label>
            <div class="rounded-lg border border-outline overflow-hidden">
                <textarea
                    class="w-full px-md py-md border-none focus:ring-0 outline-none transition-all font-body-md text-body-md bg-surface-bright resize-none font-semibold placeholder-outline/60"
                    placeholder="Ví dụ: Học sinh làm bài trong vòng 45 phút, không được sử dụng tài liệu..."
                    rows="4"></textarea>
                <div
                    class="px-md py-sm bg-surface-container-low border-t border-outline-variant flex items-center justify-between">
                    <button
                        class="flex items-center gap-sm px-md py-2 rounded-lg border border-primary text-primary font-label-md text-label-md hover:bg-primary/5 hover:border-primary/80 transition-all font-bold">
                        <span class="material-symbols-outlined">attach_file</span>
                        Đính kèm đề thi (PDF...)
                    </button>
                    <span class="text-label-sm font-label-sm text-on-surface-variant italic">Chưa đính kèm</span>
                </div>
            </div>
        </div>

        <!-- Field: Exam Structure -->
        <div class="flex flex-col gap-sm">
            <label class="font-label-sm text-label-sm uppercase tracking-widest text-on-surface font-bold">Cấu trúc đề
                kiểm tra&nbsp;</label>
            <div class="grid grid-cols-1 gap-md">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-md">
                    <!-- Toggle 1 (Active state adjusted for contrast) -->
                    <button
                        class="flex flex-col items-center justify-center gap-sm rounded-xl border-2 transition-all group relative overflow-hidden py-4 px-2 active-section bg-primary border-primary"
                        onclick="toggleSection(this)">
                        <div
                            class="flex flex-col items-center text-center group-[.active-section]:text-white text-on-surface">
                            <span class="font-label-md text-label-md transition-colors font-bold">Trắc nghiệm</span>
                            <span class="text-[10px] uppercase tracking-tighter opacity-70">Phần I</span>
                        </div>
                        <span
                            class="material-symbols-outlined absolute top-2 right-2 text-white opacity-0 group-[.active-section]:opacity-100 transition-opacity">check_circle</span>
                    </button>
                    <!-- Toggle 2 -->
                    <button
                        class="flex flex-col items-center justify-center gap-sm rounded-xl border-2 border-outline-variant hover:border-primary/50 transition-all group relative overflow-hidden py-4 px-2 bg-surface-bright"
                        onclick="toggleSection(this)">
                        <div
                            class="flex flex-col items-center text-center group-[.active-section]:text-white text-on-surface">
                            <span class="font-label-md text-label-md transition-colors font-bold">Đúng / Sai</span>
                            <span class="text-[10px] uppercase tracking-tighter opacity-70">Phần II</span>
                        </div>
                        <span
                            class="material-symbols-outlined absolute top-2 right-2 text-white opacity-0 group-[.active-section]:opacity-100 transition-opacity">check_circle</span>
                    </button>
                    <!-- Toggle 3 -->
                    <button
                        class="flex flex-col items-center justify-center gap-sm rounded-xl border-2 border-outline-variant hover:border-primary/50 transition-all group relative overflow-hidden py-4 px-2 bg-surface-bright"
                        onclick="toggleSection(this)">
                        <div
                            class="flex flex-col items-center text-center group-[.active-section]:text-white text-on-surface">
                            <span class="font-label-md text-label-md transition-colors font-bold">Tự luận</span>
                            <span class="text-[10px] uppercase tracking-tighter opacity-70">Phần III</span>
                        </div>
                        <span
                            class="material-symbols-outlined absolute top-2 right-2 text-white opacity-0 group-[.active-section]:opacity-100 transition-opacity">check_circle</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Warning Placeholder -->
        <div class="w-full flex items-center justify-center p-xl border-2 border-dashed border-outline-variant rounded-xl bg-surface-container-low/50 transition-all"
            id="warning-box">
            <div
                class="flex flex-col items-center gap-md text-on-surface-variant max-w-md animate-in fade-in duration-700">
                <div class="relative">
                    <span class="material-symbols-outlined text-[64px] text-outline/30">edit_document</span>
                    <span
                        class="material-symbols-outlined absolute -right-2 -bottom-2 text-primary animate-bounce">add_circle</span>
                </div>
                <div class="flex flex-col items-center gap-xs">
                    <p class="font-title-lg text-on-surface text-center">Đã chọn <strong class="text-primary">1
                            loại</strong> câu hỏi.</p>
                    <p class="font-body-md text-body-md text-center text-on-surface-variant font-medium">Vui lòng chọn
                        một loại câu hỏi phía trên để bắt đầu tạo nội dung chi tiết cho bài kiểm tra của bạn.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer Action-->
    <div class="w-full max-w-4xl flex justify-end animate-in fade-in slide-in-from-right-4 duration-700">
        <button
            class="group flex items-center gap-md px-xl py-4 rounded-xl bg-primary text-white shadow-lg hover:shadow-xl hover:brightness-110 active:scale-95 transition-all">
            <span class="font-headline-md text-headline-md font-bold">Tạo Bài Kiểm Tra</span>
        </button>
    </div>

    <!-- Floating Atmosphere Elements (Toned down) -->


    <script class="">
        function toggleSection(element) {
            // Updated toggle logic to maintain visibility
            const isActive = element.classList.contains('active-section');
            if (isActive) {
                element.classList.remove('active-section', 'bg-primary',);
            }
        }
    </script>
</body>

</html>
