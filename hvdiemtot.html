    </div>
    <script>
        // Simple interactivity for the rows
        document.querySelectorAll('.success-row').forEach(row => {
            row.addEventListener('click', () => {
                row.classList.add('ring-2', 'ring-primary', 'ring-offset-2');
                setTimeout(() => {
                    row.classList.remove('ring-2', 'ring-primary', 'ring-offset-2');
                }, 1000);
            });
        });

        // Close button mock interaction
        document.querySelector('button.bg-secondary-container').addEventListener('click', () => {
            const main = document.querySelector('main');
            main.style.opacity = '0';
            main.style.transform = 'scale(0.95)';
            main.style.transition = 'all 0.3s ease';
            setTimeout(() => {
                location.reload(); // Reset for demo
            }, 1000);
        });
    </script>
